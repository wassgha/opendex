name: Deploy landing page

# Builds the static marketing site in site/ and publishes it to GitHub Pages.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
    # Also redeploy on every release tag so the site picks up the new version
    # (the version is injected at build time from the newest tag — see below).
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 pulls full history + tags so `git describe` can find the
      # latest release tag (the default shallow clone has none).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No `version:` here — pnpm/action-setup reads it from the root
      # package.json `packageManager` field (pnpm@10.8.1). Setting both errors.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install
        working-directory: site
        run: pnpm install --frozen-lockfile

      # Inject the newest release tag (e.g. v1.1.1 → 1.1.1) so the site shows the
      # current version. Falls back to the site.ts default if no tag is found.
      - name: Resolve latest release version
        run: |
          VERSION="$(git describe --tags --abbrev=0 --match 'v*.*.*' 2>/dev/null | sed 's/^v//')"
          echo "Resolved OpenDex version: ${VERSION:-<none, using fallback>}"
          # Only export when found — an empty string wouldn't trigger the
          # nullish-coalescing fallback in site.ts.
          if [ -n "$VERSION" ]; then
            echo "VITE_OPENDEX_VERSION=$VERSION" >> "$GITHUB_ENV"
          fi

      - name: Build
        working-directory: site
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

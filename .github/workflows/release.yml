name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate the release on a typecheck so broken types can't ship via auto-update.
      - name: Typecheck
        run: pnpm typecheck

      # macOS: decode the App Store Connect API key used for notarization.
      - name: Setup Apple API key
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          chmod 600 "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      # macOS: build, sign (Developer ID), notarize, and publish to GitHub Releases.
      - name: Build, sign & publish (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # Windows / Linux: build (unsigned) and publish to GitHub Releases.
      - name: Build & publish (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: pnpm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Flip the draft to published only after every OS build succeeds, so a release
  # never goes live (or reaches auto-update) with partial artifacts. fail-fast is
  # off above, so a failed build skips this job and the release stays a draft.
  publish:
    needs: release
    runs-on: ubuntu-latest
    env:
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve previous tag
        id: tags
        run: |
          CURRENT="${{ github.ref_name }}"
          PREVIOUS=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | grep -v "^${CURRENT}$" | head -1 || true)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        if: env.AI_GATEWAY_API_KEY != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=("${{ steps.tags.outputs.current }}")
          if [ -n "${{ steps.tags.outputs.previous }}" ]; then
            ARGS+=("${{ steps.tags.outputs.previous }}")
          fi
          pnpm tsx scripts/generate-release-notes.ts "${ARGS[@]}" > release-notes.md
          gh release edit "${{ github.ref_name }}" \
            --repo wassgha/opendex \
            --notes-file release-notes.md

      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo wassgha/opendex \
            --draft=false --latest

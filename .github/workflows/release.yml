name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate the release on a typecheck so broken types can't ship via auto-update.
      - name: Typecheck
        run: pnpm typecheck

      # macOS: decode the App Store Connect API key used for notarization.
      - name: Setup Apple API key
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          chmod 600 "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      # macOS: build, sign (Developer ID), notarize, and publish to GitHub Releases.
      - name: Build, sign & publish (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # Windows / Linux: build (unsigned) and publish to GitHub Releases.
      - name: Build & publish (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: pnpm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Flip the draft to published only after every OS build succeeds, so a release
  # never goes live (or reaches auto-update) with partial artifacts. fail-fast is
  # off above, so a failed build skips this job and the release stays a draft.
  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo wassgha/opendex \
            --draft=false --latest
